      # Heating Physical Index

      This folder contains physical and operating knowledge for heat pumps, brine, hot water and related slow energy systems.

      ## Files

      ```text
      heat-pumps.md          VP1/VP2 physical command model and logical levels
      geodan-smart-grid.md   Geodan IN11/IN12 Smart Grid control semantics and diagnostics
      brine.md               brine/borehole planning model
      hot-water.md           domestic hot water notes and open gaps
      ```

      ## Boundary

      This folder contains physical facts and planning baselines.

      Future planners/optimizers belong in requirements, source and deploy artifacts.

