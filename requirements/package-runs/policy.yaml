version: 1
package: P0007
purpose: package_run_evidence_policy
root: requirements/package-runs/Pxxxx
files:
  review.md:
    required_for: all_packages
    content:
      - consistency_result
      - files_checked
      - warnings_or_conflicts
      - decision
  design.md:
    required_for: code_packages
    before: implementation
    content:
      - package_interpretation
      - implementation_structure
      - intended_file_changes
      - intentionally_unchanged_files
      - deliberate_refactoring_decisions
      - test_strategy
      - risks
  functions.md:
    required_for: code_packages
    before: implementation
    content:
      - new_functions
      - changed_functions
      - removed_functions
      - relevant_unchanged_functions
      - purpose
      - inputs
      - outputs
      - side_effects
      - reason
      - tests
  attempts.md:
    required_for: implementation_or_debug
    content:
      - attempt_number
      - change_summary
      - tests_run
      - result
      - next_action
  findings.md:
    required_for: when_findings_exist
    content:
      - issue
      - status
      - fixed_or_open
      - promoted_to_knowhow
      - needs_new_package
  logs:
    required_for: when_live_or_log_evidence_exists
    rule: prefer_concise_excerpts
cross_package_function_catalog:
  path: docs/functions
  update_when:
    - function_created
    - function_changed
    - function_removed
    - function_relevant_for_future_packages
promotion:
  reusable_lessons: memory/knowhow
  rule: package_findings_that_are_general_lessons_should_be_promoted
